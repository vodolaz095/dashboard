name: make release

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    services:

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: "dashboard"
          MYSQL_DATABASE: "dashboard"
        ports:
          - 3306:3306

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: "dashboard"
          POSTGRES_PASSWORD: "dashboard"
          POSTGRES_DB: "dashboard"
        ports:
          - "5432:5432"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
          cache: true
          cache-dependency-path: go.sum

      - name: Install govulncheck utility
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan for vulnerable packages
        run: make vuln

      - name: Run unit tests
        env:
          REDIS_URL: redis://127.0.0.1:6379
          PG_URL: postgres://dashboard:dashboard@localhost:5432/dashboard?sslmode=disable
          MYSQL_URL: root:dashboard@(127.0.0.1:3306)/dashboard
        run: make test

      - name: Create build directory
        run: mkdir -p build

      - name: Build binary for Linux on AMD64
        env:
          GOOS: linux
          CGO_ENABLED: 0
          GOARCH: amd64
        run: go build -ldflags "-s -w -X main.Version=${{ github.sha }}" -o build/dashboard_linux_amd64 main.go

      - name: Build binary for Linux on ARM 6
        env:
          GOOS: linux
          CGO_ENABLED: 0
          GOARCH: arm
          GOARM: 6
        run: go build -ldflags "-s -w -X main.Version=${{ github.sha }}" -o build/dashboard_linux_arm6 main.go

      - name: Build binary for Linux on ARM 7
        env:
          GOOS: linux
          CGO_ENABLED: 0
          GOARCH: arm
          GOARM: 7
        run: go build -ldflags "-s -w -X main.Version=${{ github.sha }}" -o build/dashboard_linux_arm7 main.go

      - name: Build binary for Linux on ARM64
        env:
          GOOS: linux
          CGO_ENABLED: 0
          GOARCH: arm64
        run: go build -ldflags "-s -w -X main.Version=${{ github.sha }}" -o build/dashboard_linux_arm64 main.go

      - name: Build binary for Windows on AMD64
        env:
          GOOS: windows
          CGO_ENABLED: 0
          GOARCH: amd64
        run: go build -ldflags "-s -w -X main.Version=${{ github.sha }}" -o build/dashboard.exe main.go

      - name: Build binary for macOS on AMD64
        env:
          GOOS: darwin
          CGO_ENABLED: 0
          GOARCH: amd64
        run: go build -ldflags "-s -w -X main.Version=${{ github.sha }}" -o build/dashboard_darwin_amd64 main.go

      - name: Build binary for macOS on ARM64 (M1/M2)
        env:
          GOOS: darwin
          CGO_ENABLED: 0
          GOARCH: arm64
        run: go build -ldflags "-s -w -X main.Version=${{ github.sha }}" -o build/dashboard_darwin_arm64 main.go

      - name: Make MD5 signature file
        run: |
          md5sum build/* > build/dashboard.md5
          cat build/dashboard.md5

      - name: Expose build result
        run: ls -la build/

      - name: Release
        uses: ncipollo/release-action@v1.14.0
        with:
          draft: true
          name: "Release ${{ github.sha }}"
          body: |
            Code is generated from commit https://github.com/vodolaz095/dashboard/commit/${{ github.sha }}

            ${{ steps.release_notes.outputs.body }}
          generateReleaseNotes: true
          commit: ${{ github.sha }}
          tag: v${{ github.run_number }}
          artifacts: "build/dashboard*"
